    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
    <script>
      const input = document.getElementById("note-input");
      const intro = document.getElementById("reader-intro");
      const output = document.getElementById("reader-output");
      const status = document.getElementById("reader-status");

      marked.setOptions({
        breaks: false,
        gfm: true
      });

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function cleanYamlValue(value) {
        return value.trim().replace(/^['"]|['"]$/g, "");
      }

      function parseFrontMatter(markdown) {
        const match = markdown.match(/^---\n([\s\S]*?)\n---\n?/);
        if (!match) {
          return { data: {}, body: markdown };
        }

        const data = {};
        const lines = match[1].split("\n");

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          const pair = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
          if (!pair) continue;

          const key = pair[1];
          let value = pair[2];

          if (value === ">-" || value === "|-" || value === ">" || value === "|") {
            const block = [];
            while (index + 1 < lines.length && /^\s+/.test(lines[index + 1])) {
              index += 1;
              block.push(lines[index].trim());
            }
            data[key] = block.join(" ");
          } else {
            data[key] = cleanYamlValue(value);
          }
        }

        return {
          data,
          body: markdown.slice(match[0].length)
        };
      }

      function formatDate(value) {
        if (!value) return "";
        const date = new Date(`${value}T00:00:00`);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      function renderNote(markdown) {
        const parsed = parseFrontMatter(markdown);
        const data = parsed.data;
        const body = marked.parse(parsed.body);
        const title = data.title || "Untitled Note";
        const meta = [data.book, data.author, data.chapter, formatDate(data.date)].filter(Boolean).join(" · ");
        const subtitle = data.subtitle ? `<p class="note-subtitle">${escapeHtml(data.subtitle)}</p>` : "";
        const metaHtml = meta ? `<p class="note-meta">${escapeHtml(meta)}</p>` : "";
        const abstract = data.abstract ? `<div class="note-abstract">${marked.parse(data.abstract)}</div>` : "";

        return `
          <h1>${escapeHtml(title)}</h1>
          ${subtitle}
          ${metaHtml}
          ${abstract}
          <hr>
          <div class="note-content">
            ${body}
          </div>
        `;
      }

      input.addEventListener("change", async () => {
        const file = input.files && input.files[0];
        if (!file) {
          intro.hidden = false;
          output.innerHTML = "";
          status.textContent = "No file selected.";
          return;
        }

        const markdown = await file.text();
        intro.hidden = true;
        output.innerHTML = DOMPurify.sanitize(renderNote(markdown));
        status.textContent = `Loaded ${file.name}.`;

        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise([output]);
        }
      });
    </script>
